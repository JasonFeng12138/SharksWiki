version: '3.8'

services:
  # ── MySQL 数据库 ─────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: sharkswiki-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: personal_wiki
      MYSQL_USER: wiki_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wiki_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database_init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Wiki 应用（后端 + 前端静态文件）──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sharkswiki-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: wiki_user
      DB_PASSWORD: ${MYSQL_PASSWORD:-wiki_password}
      DB_NAME: personal_wiki
      JWT_SECRET: ${JWT_SECRET:-sharkswiki_please_change_this_secret_in_production}
      JWT_EXPIRES_IN: 7d
      DOCS_DIR: /app/docs
      CONFIG_DIR: /app/config
      FRONTEND_DIST: /app/frontend_dist
    ports:
      - "${APP_PORT:-3001}:3001"
    volumes:
      - docs_data:/app/docs
      - config_data:/app/config

volumes:
  mysql_data:
  docs_data:
  config_data:
