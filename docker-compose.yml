# docker-compose.yml — 应用服务
#
# 用法：
#   首次部署：docker compose up -d --build
#   重新部署（不影响数据库）：docker compose up -d --build --force-recreate
#   停止应用：docker compose down
#
# ⚠️  前提：MySQL 必须已通过 docker-compose.db.yml 启动，
#           且共享网络 sharkswiki-net 已存在。

version: '3.8'

services:
  # ── Wiki 应用（后端 + 前端静态文件）──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sharkswiki-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: sharkswiki-mysql
      DB_PORT: 3306
      DB_USER: wiki_user
      DB_PASSWORD: ${MYSQL_PASSWORD:-wiki_password}
      DB_NAME: personal_wiki
      JWT_SECRET: ${JWT_SECRET:-sharkswiki_please_change_this_secret_in_production}
      JWT_EXPIRES_IN: 7d
      DOCS_DIR: /app/docs
      CONFIG_DIR: /app/config
      FRONTEND_DIST: /app/frontend_dist
    ports:
      - "${APP_PORT:-3001}:3001"
    volumes:
      - docs_data:/app/docs
      - config_data:/app/config
    networks:
      - sharkswiki-net

volumes:
  docs_data:
  config_data:

networks:
  sharkswiki-net:
    external: true
    name: sharkswiki-net
